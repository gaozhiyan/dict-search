<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剑桥词典批量查询器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-radius: 50%;
            border-top: 4px solid #3498db;
            width: 30px;
            height: 30px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .play-btn {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .play-btn:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-12 max-w-4xl">
        <div class="bg-white rounded-xl shadow-lg p-8 mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">📚 剑桥词典批量查询工具</h1>
            <div class="text-xl font-semibold text-blue-600 mb-4 tracking-wider">【虎刻特供】</div>
            <p class="text-gray-600 mb-8">上传一个包含英语单词的 .txt 文件，我们将自动为您查询每个单词的发音、翻译和例句。</p>
            
            <div class="flex flex-col items-center justify-center">
                <label for="file-upload" class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition duration-300 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    选择 TXT 文件
                </label>
                <input id="file-upload" type="file" accept=".txt" class="hidden" onchange="handleFileChange(event)" />
                <p id="file-name" class="mt-4 text-sm text-gray-500 font-medium"></p>
                
                <button id="upload-btn" onclick="uploadFile()" class="mt-4 bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition duration-300 hidden">
                    开始查询
                </button>
            </div>
            
            <div id="loading" class="mt-8 hidden">
                <div class="loader"></div>
                <p class="mt-4 text-gray-600">正在查询词典，这可能需要一些时间，请耐心等待...</p>
            </div>
        </div>

        <div id="results" class="space-y-6">
            <!-- Results will be injected here -->
        </div>
    </div>

    <script>
        let selectedFile = null;

        function handleFileChange(event) {
            const file = event.target.files[0];
            if (file) {
                if (file.name.endsWith('.txt')) {
                    selectedFile = file;
                    document.getElementById('file-name').textContent = `已选择文件: ${file.name}`;
                    document.getElementById('upload-btn').classList.remove('hidden');
                } else {
                    alert('请上传 .txt 格式的文件！');
                    event.target.value = '';
                    selectedFile = null;
                    document.getElementById('file-name').textContent = '';
                    document.getElementById('upload-btn').classList.add('hidden');
                }
            }
        }

        async function uploadFile() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').innerHTML = '';
            document.getElementById('upload-btn').disabled = true;

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('网络请求失败或服务器出错');
                }

                const data = await response.json();
                renderResults(data.results);
            } catch (error) {
                alert(`查询失败: ${error.message}`);
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('upload-btn').disabled = false;
            }
        }
        
        function playAudio(url) {
            if (url) {
                const audio = new Audio(url);
                audio.play();
            }
        }

        function renderResults(results) {
            const container = document.getElementById('results');
            
            if (results.length === 0) {
                container.innerHTML = `<div class="bg-white rounded-xl shadow p-6 text-center text-gray-500">文件中没有找到有效的单词。</div>`;
                return;
            }

            const mainCard = document.createElement('div');
            mainCard.className = 'bg-white rounded-xl shadow-md p-6 overflow-hidden border border-gray-100 relative';
            
            // Add copy button
            const copyBtn = document.createElement('button');
            copyBtn.className = 'absolute top-4 right-4 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2';
            copyBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                一键复制
            `;
            copyBtn.onclick = () => {
                const textToCopy = contentContainer.innerText;
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalText = copyBtn.innerHTML;
                    copyBtn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        <span class="text-green-600">已复制</span>
                    `;
                    setTimeout(() => { copyBtn.innerHTML = originalText; }, 2000);
                });
            };
            mainCard.appendChild(copyBtn);

            const contentContainer = document.createElement('div');
            contentContainer.className = 'mt-8 space-y-6';

            results.forEach(item => {
                const wordBlock = document.createElement('div');
                wordBlock.className = 'word-block';
                
                if (item.error) {
                    wordBlock.innerHTML = `
                        <div class="text-lg text-gray-800 leading-relaxed font-sans mb-1">
                            <span class="font-bold capitalize">${item.word}</span>
                            <span class="text-red-500 text-sm ml-2">查询失败: ${item.error}</span>
                        </div>
                    `;
                    contentContainer.appendChild(wordBlock);
                    return;
                }

                let contentHtml = '';
                const wordCapitalized = item.word.charAt(0).toUpperCase() + item.word.slice(1);
                const phoneticStr = item.phonetic ? `/${item.phonetic}/` : '';
                const posStr = item.pos ? `${item.pos}` : '';
                const transStr = item.translation || '';
                
                contentHtml += `<div class="text-lg text-gray-800 leading-relaxed font-sans mb-1 whitespace-pre-wrap"><span class="font-bold">${wordCapitalized}</span> ${phoneticStr} ${posStr} ${transStr}</div>`;

                if (item.definition) {
                    contentHtml += `<div class="text-gray-800 pl-2 leading-relaxed whitespace-pre-wrap">○ ${item.definition}</div>`;
                }

                if (item.examples && item.examples.length > 0) {
                    item.examples.forEach(ex => {
                        contentHtml += `<div class="text-gray-800 pl-2 leading-relaxed whitespace-pre-wrap">○ e.g. ${ex.en} ${ex.zh}</div>`;
                    });
                }

                wordBlock.innerHTML = contentHtml;
                contentContainer.appendChild(wordBlock);
            });
            
            mainCard.appendChild(contentContainer);
            container.appendChild(mainCard);
        }
    </script>
</body>
</html>
