[build]
  command = "pip install -r requirements.txt"
  publish = "static"
  functions = "netlify/functions"

[functions]
  included_files = ["main.py", "scraper.py"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200